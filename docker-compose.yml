services:
  app:
    build:
      context: .
      args:
        LDFLAGS: ${LDFLAGS:-}
    depends_on:
      postgres:
        condition: service_healthy
      gcs:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      APP_ENV: dev
      HTTP_ADDR: :8080
      READ_TIMEOUT: 10s
      WRITE_TIMEOUT: 30s
      SHUTDOWN_TIMEOUT: 10s
      DATABASE_DSN: postgres://forge:forge@postgres:5432/forge?sslmode=disable
      ADMIN_TOKEN: ${ADMIN_TOKEN:-forge-admin-token-local}
      # gcs
#      ARTIFACT_BACKEND: gcs
#      ARTIFACT_ENDPOINT: http://gcs:4443
      # gcs
      # minio
      ARTIFACT_BACKEND: s3
      ARTIFACT_ENDPOINT: http://minio:9000
      ARTIFACT_ACCESS_KEY_ID: minioadmin
      ARTIFACT_SECRET_ACCESS_KEY: minioadmin
      ARTIFACT_PATH_STYLE: true
      # minio
      ARTIFACT_BUCKET: puppet-forge-artifacts
      ARTIFACT_PROJECT: local-dev
      ARTIFACT_PREFIX: modules
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      PUBLIC_MODULE_ACCESS: ${PUBLIC_MODULE_ACCESS:-false}
      ACTIVE_RELEASE_TTL: ${ACTIVE_RELEASE_TTL:-720h}
      SECURITY_HSTS_ENABLED: ${SECURITY_HSTS_ENABLED:-false}
      WEB_AUTH_MODE: ${WEB_AUTH_MODE:-none}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URL: ${OIDC_REDIRECT_URL:-}
      OIDC_LOGOUT_URL: ${OIDC_LOGOUT_URL:-}
      OIDC_COOKIE_SECRET: ${OIDC_COOKIE_SECRET:-}
      UPSTREAM_URL: https://forgeapi.puppetlabs.com
      UPSTREAM_PROXY_JSON_CACHE_TTL: 5m
      UPSTREAM_PROXY_JSON_STALE_TTL: 1h
      FORGE_CACHE_MAX_BODY_BYTES: 1048576
      MODULE_UPLOAD_MAX_BYTES: 134217728
      UPSTREAM_ARTIFACT_MAX_BYTES: 134217728
      UPSTREAM_SYNC_INTERVAL: 15m
      UPSTREAM_SYNC_LIMIT: 1000
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "forge", "-d", "forge"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  gcs:
    image: fsouza/fake-gcs-server:1.54.0
    command:
      - -scheme
      - http
      - -backend
      - memory
      - -public-host
      - gcs:4443
    ports:
      - "4443:4443"

  minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z
    command:
      - server
      - /data
      - --console-address
      - :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - >
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/puppet-forge-artifacts

  r10k:
    image: puppet/r10k
    depends_on:
      app:
        condition: service_started
    working_dir: /work
    command:
      - puppetfile
      - install
      - --moduledir=/tmp/r10k-modules
      - --config=/work/r10k.yaml
      - --verbose=info
    configs:
      - source: r10k_puppetfile
        target: /work/Puppetfile
      - source: r10k_config
        target: /work/r10k.yaml

configs:
  r10k_puppetfile:
    content: |
      mod 'puppetlabs-apt', '11.3.1'
      mod 'puppet-archive', '8.1.0'
      mod 'puppetlabs-ntp', '11.1.0'
      mod 'saz-timezone', '7.0.0'
      mod 'stm-debconf', '7.0.1'
      mod 'LeLutin-smartd', '2.6.3'
      mod 'puppetlabs-concat', '9.1.0'
  r10k_config:
    content: |
      ---
      cachedir: '/tmp/r10k-cache'

      forge:
        baseurl: 'http://app'
        authorization_token: 'Bearer ${ADMIN_TOKEN:-forge-admin-token-local}'

volumes:
  postgres-data:
  minio-data:
