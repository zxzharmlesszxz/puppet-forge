---

name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RELEASE_PLATFORMS: "linux/amd64 linux/arm64 darwin/amd64 darwin/arm64"
  DOCKER_PLATFORMS: "linux/amd64,linux/arm64"
  GO_VERSION: "1.26.5"

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    uses: ./.github/workflows/checks.yml
    with:
      go-version: "1.26.5"
      release-platforms: "linux/amd64 linux/arm64 darwin/amd64 darwin/arm64"

  release:
    name: Release Artifacts
    runs-on: ubuntu-24.04
    needs:
      - checks
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Release Archives
        run: make release-smoke VERSION="${{ github.ref_name }}" PLATFORMS="${{ env.RELEASE_PLATFORMS }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          body: "Release ${{ github.ref_name }}"
          files: |
            dist/*.tar.gz
            dist/checksums.txt

  docker-publish:
    name: Publish Docker Image
    runs-on: ubuntu-24.04
    needs:
      - checks
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ env.DOCKER_PLATFORMS }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          build-args: |
            LDFLAGS=-s -w -X main.version=${{ github.ref_name }}

  helm-publish:
    name: Publish Helm Chart
    runs-on: ubuntu-24.04
    needs:
      - checks
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Prepare Chart Version
        shell: bash
        run: |
          chart_version="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: ${chart_version}/" deploy/puppet-forge/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${GITHUB_REF_NAME}\"/" deploy/puppet-forge/Chart.yaml

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Ensure Helm Repository Branch
        shell: bash
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            exit 0
          fi

          worktree="$(mktemp -d)"
          trap 'git worktree remove --force "$worktree" >/dev/null 2>&1 || rm -rf "$worktree"' EXIT
          git worktree add --detach "$worktree"
          git -C "$worktree" switch --orphan gh-pages
          git -C "$worktree" clean -fdx
          touch "$worktree/.nojekyll"
          git -C "$worktree" add .nojekyll
          git -C "$worktree" commit -m "chore: initialize helm chart repository"
          git -C "$worktree" push origin gh-pages
          git worktree remove "$worktree"
          trap - EXIT

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: deploy
          skip_existing: true
          packages_with_index: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

  finalize-release:
    name: Finalize Release Metadata
    runs-on: ubuntu-24.04
    needs:
      - release
      - docker-publish
      - helm-publish
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Update Source Chart Version
        shell: bash
        run: |
          default_branch="${{ github.event.repository.default_branch }}"
          chart_version="${GITHUB_REF_NAME#v}"

          git fetch origin "${default_branch}"
          git switch -C "${default_branch}" "origin/${default_branch}"

          sed -i "s/^version:.*/version: ${chart_version}/" deploy/puppet-forge/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${GITHUB_REF_NAME}\"/" deploy/puppet-forge/Chart.yaml

          if git diff --quiet -- deploy/puppet-forge/Chart.yaml; then
            echo "Source chart metadata is already aligned with ${GITHUB_REF_NAME}."
            exit 0
          fi

          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add deploy/puppet-forge/Chart.yaml
          git commit -m "chore(chart): mark ${GITHUB_REF_NAME} as released [skip ci]"
          git push origin "HEAD:${default_branch}"
