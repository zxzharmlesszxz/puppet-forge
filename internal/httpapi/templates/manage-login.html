<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Team Access</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f0ea;
      --panel: #ffffff;
      --ink: #1f2428;
      --muted: #66717a;
      --accent: #2f6f73;
      --line: #d9e0e2;
      --danger: #a33a32;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    main {
      width: min(420px, calc(100vw - 32px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(31, 36, 40, 0.08);
    }
    h1 {
      margin: 0 0 18px;
      font-size: 28px;
      line-height: 1.15;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }
    input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 12px;
      font: inherit;
    }
    button {
      width: 100%;
      height: 44px;
      margin-top: 14px;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    .error {
      margin: 0 0 14px;
      color: var(--danger);
      font-size: 14px;
    }
    .back {
      display: inline-block;
      margin-top: 16px;
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: "";
      height: 1px;
      flex: 1;
      background: var(--line);
    }
    .oidc {
      display: block;
      height: 44px;
      line-height: 44px;
      border-radius: 6px;
      background: var(--accent);
      color: white;
      text-align: center;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Team Access</h1>
    {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
    {{if .HasOIDC}}
    <a class="oidc" href="/auth/login?next=%2Fmanage">Sign in with OIDC</a>
    <div class="divider">or token</div>
    {{end}}
    <form method="post" action="/manage/login">
      <label for="token">Publish or admin token</label>
      <input id="token" name="token" type="password" autocomplete="current-password" autofocus required>
      <button type="submit">Sign in</button>
    </form>
    <a class="back" href="/">Back to modules</a>
  </main>
</body>
</html>
